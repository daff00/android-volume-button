plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.example.volumeslider'
    compileSdk 34 // Modern compiler version

    defaultConfig {
        applicationId "com.example.volumeslider"
        minSdk 30 // Target minimum Android 11 as requested
        targetSdk 30 // Target exactly Android 11
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // Only the absolute bare minimum Kotlin extensions, no bulky UI libraries!
    implementation 'androidx.core:core-ktx:1.12.0'
}
